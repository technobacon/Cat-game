name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Headless GUT tests
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.6.3-stable"
      GUT_VERSION: "v9.3.0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot (headless)
        run: |
          set -euo pipefail
          url="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          wget -q "$url" -O godot.zip
          unzip -q godot.zip
          install -m 0755 "Godot_v${GODOT_VERSION}_linux.x86_64" /usr/local/bin/godot
          godot --headless --version

      - name: Fetch GUT
        working-directory: game
        run: GUT_VERSION="${GUT_VERSION}" ./scripts/setup_gut.sh

      - name: Import resources
        working-directory: game
        run: godot --headless --import || true

      - name: Run tests
        working-directory: game
        run: |
          godot --headless -s res://addons/gut/gut_cmdln.gd \
            -gdir=res://tests -ginclude_subdirs -gexit
