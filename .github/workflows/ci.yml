name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# A new push cancels an in-progress run on the same ref (also frees a hung run).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Headless GUT tests
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.6.3-stable"
      # Empty = latest GUT (must match the Godot version; old pins hang on exit).
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot (headless)
        run: |
          set -euo pipefail
          url="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          wget -q "$url" -O godot.zip
          unzip -q godot.zip
          install -m 0755 "Godot_v${GODOT_VERSION}_linux.x86_64" /usr/local/bin/godot
          godot --headless --version

      - name: Fetch GUT
        working-directory: game
        run: ./scripts/setup_gut.sh

      - name: Import resources
        working-directory: game
        run: godot --headless --import || true

      - name: Run tests
        working-directory: game
        # timeout guards against a test runner that fails to exit; a hang
        # becomes a fast, visible failure instead of burning the runner.
        run: |
          timeout 240 godot --headless -s res://addons/gut/gut_cmdln.gd \
            -gdir=res://tests -ginclude_subdirs -gexit
